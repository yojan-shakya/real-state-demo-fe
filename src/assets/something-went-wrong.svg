<!-- Taken from chatgpt -->

<svg width="180" height="180" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Laptop -->
  <rect x="40" y="60" width="120" height="70" rx="10" fill="#e5e7eb"/>
  <rect x="35" y="130" width="130" height="12" rx="6" fill="#9ca3af"/>

  <!-- Screen (off) -->
  <rect x="50" y="70" width="100" height="50" rx="6" fill="#111827"/>

  <!-- Cable -->
  <path d="M120 140 C140 150, 150 140, 160 130" 
        stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Plug (disconnected) -->
  <g transform="rotate(20 160 130)">
    <rect x="155" y="120" width="12" height="16" rx="3" fill="#374151"/>
    <line x1="158" y1="120" x2="158" y2="112" stroke="#374151" stroke-width="2"/>
    <line x1="164" y1="120" x2="164" y2="112" stroke="#374151" stroke-width="2"/>
  </g>

  <!-- Small “no power” indicator -->
  <circle cx="55" cy="135" r="3" fill="#ef4444"/>
</svg>